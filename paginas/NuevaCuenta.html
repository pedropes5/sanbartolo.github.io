<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLLERIA SAN BARTOLO</title>
</head>
<body>
    <header>
        <h2>CREAR NUEVA CUENTA</h2>
    </header>

    <main>
        <nav><a href="./MiCuenta.html">LOGIN</a>
        </nav>
        <br>

        <form>
            <label>Nombres:</label>
            <input type="text" required> <br><br>

            <label>Apellidos:</label>
            <input type="text" required> <br> <br>

            <label>Número de DNI:</label>
            <input type="number" required placeholder="Ejm:12345678"> <br> <br>
            
            <label>Número de Telefono:</label>
            <input type="number" required placeholder="Ejm: 987 654 321"> <br> <br>

            <label>Pais:</label>
            <select name="país">
                <option value="Perú">Perú</option>
                <option value="Venezuela">Venezuela</option>
                <option value="Chile">Chile</option>
                <option value="Argentina">Argentina</option>
                <option value="Brasil">Brasil</option>
                <option value="Colombia">Colombia</option>
                <option value="Ecuador">Ecuador</option>
                <option value="Bolvia">Bolivia</option>
                <option value="Paraguay">Paraguay</option>
                <option value="Uruguay">Uruguay</option>
            </select> <br> <br>

            <label>Correo Electronico:</label>
            <input type="email" required placeholder="Ejm: pepito123@gmail.com"> <br> <br>

            <label>Contraseña</label>
            <input type="text" required> <br> <br>

            <input type="submit" value="Enviar">
        </form>
    </main>
    
</body>
</html>
